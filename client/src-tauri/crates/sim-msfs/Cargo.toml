[package]
name = "sim-msfs"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "MSFS 2020/2024 simulator adapter — raw SimConnect FFI (Windows only). Never FSUIPC."
build = "build.rs"

# Windows-only crate: on non-Windows targets the lib has only a placeholder
# struct so the workspace still builds on macOS/Linux for ports of unrelated
# crates. SimConnect bindings are generated by build.rs against the
# vendored MSFS 2024 SDK header in ffi/include/.

[dependencies]
sim-core.workspace = true
serde.workspace = true
chrono.workspace = true
thiserror.workspace = true
tracing.workspace = true
# parking_lot: poison-free Mutex for the SimConnect ingest threads — a panic in
# one ingest thread must not cascade-poison every subsequent lock.
parking_lot = "0.12"
tokio = { workspace = true, features = ["sync", "rt", "time", "macros"] }

[target.'cfg(target_os = "windows")'.build-dependencies]
bindgen = "0.69"

[lints]
workspace = true
