name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Pre-flight gate ─────────────────────────────────────────────────
  #
  # v0.10.0 (#release-checklist): vor jedem signed Build muessen drei
  # Voraussetzungen erfuellt sein — sonst wird gar nicht erst gebaut.
  # Hintergrund: v0.9.0/v0.9.1/v0.9.2 wurden mit kaputtem Update-Modal
  # released weil niemand vor Tag-Push gegenpruefte. Mit diesem Job
  # gibt's einen automatischen Gate gegen dieselbe Klasse von Bug:
  #
  #   1. Tag entspricht der Version in package.json / Cargo.toml /
  #      tauri.conf.json — verhindert „v0.10.0 Tag aber package.json
  #      sagt 0.9.2"-Drift
  #   2. Release-Notes-File `docs/release-notes/v{TAG}.md` existiert
  #      — Pilot muss im Update-Modal lesbare Notes sehen
  #   3. Vitest laeuft sauber (insbesondere UpdateButton.test.tsx der
  #      die Modal-Struktur-Regression verhindert)
  #
  # Wenn EINER der Checks failt, wird der Build NICHT gestartet.
  # Tag bleibt, aber GitHub-Release entsteht nicht. Fixed werden muss
  # auf dem Branch, neuer Tag, neuer Push.
  release-preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Verify tag matches package.json / Cargo.toml / tauri.conf.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          echo "Tag (sans v): $TAG"

          PKG_VERSION=$(node -p "require('./client/package.json').version")
          CARGO_VERSION=$(grep -E '^version = "' client/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          TAURI_VERSION=$(node -p "require('./client/src-tauri/tauri.conf.json').version")

          echo "package.json:      $PKG_VERSION"
          echo "Cargo.toml:        $CARGO_VERSION"
          echo "tauri.conf.json:   $TAURI_VERSION"

          fail=0
          [[ "$PKG_VERSION" == "$TAG" ]] || { echo "::error::package.json version ($PKG_VERSION) != tag ($TAG)"; fail=1; }
          [[ "$CARGO_VERSION" == "$TAG" ]] || { echo "::error::Cargo.toml version ($CARGO_VERSION) != tag ($TAG)"; fail=1; }
          [[ "$TAURI_VERSION" == "$TAG" ]] || { echo "::error::tauri.conf.json version ($TAURI_VERSION) != tag ($TAG)"; fail=1; }
          [[ $fail -eq 0 ]] || exit 1

      - name: Verify release-notes file exists
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"  # mit "v"-Prefix
          NOTES="docs/release-notes/${TAG}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "::error::Release-Notes-Datei fehlt: $NOTES"
            echo "::error::Bitte vor dem Tag eine bilinguale Release-Notes-Datei (🇩🇪 + 🇬🇧) anlegen."
            echo "::error::Siehe docs/release-checklist.md Stufe 2."
            exit 1
          fi
          # Bonus: pruefen ob bilingual (= 🇩🇪 + 🇬🇧 vorhanden)
          if ! grep -q "🇩🇪" "$NOTES"; then
            echo "::warning::Release-Notes ohne 🇩🇪 Deutsch-Block — bilingual gewuenscht (siehe MEMORY.md)"
          fi
          if ! grep -q "🇬🇧" "$NOTES"; then
            echo "::warning::Release-Notes ohne 🇬🇧 English-Block — bilingual gewuenscht (siehe MEMORY.md)"
          fi
          echo "Release-Notes vorhanden: $NOTES"
          wc -l "$NOTES"

      - name: Install Tauri Linux deps (libwebkit2gtk etc.)
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
        # v0.10.0 hotfix-2: `cargo check` weiter unten kompiliert den
        # `aeroacars-app`-Crate (Tauri-App), der auf Linux libwebkit2gtk-
        # 4.1, glib-2.0 etc. als System-Lib braucht. Ohne diesen Step
        # failt cargo check auf Ubuntu mit „pkg-config: glib-2.0 not
        # found" (siehe Run 26045741380). Platform-Build-Jobs laufen auf
        # Windows + macOS (= keine apt-Logik), deshalb fiel das dort nie
        # auf — nur unser Ubuntu-preflight braucht die Liste.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: cargo check (Rust workspace — catches "lokal grun remote rot" durch ungestagete Files)
        working-directory: client/src-tauri
        run: cargo check --all-targets
        # v0.10.0 hotfix: dieser Step ist NEU weil der erste v0.10.0
        # Build-Versuch (Mac DMG, Run 26045269464) am `error_reporting_
        # send_test_event`-Aufruf in src/lib.rs gefailed ist — die
        # referenzierte `sentry_init::send_test_event`-Funktion war nur
        # im lokalen Working-Tree des Devs, nie ans Repo committed.
        # Lokal kompilierte alles, im sauberen CI-Checkout broke der
        # aeroacars-app crate. Mit diesem cargo-check-Step im preflight
        # wird die Klasse von Bug VOR den eigentlichen platform-Builds
        # gefangen — spart 4+ Minuten Mac-Runner-Zeit pro broken Tag.

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Run vitest (incl. UpdateButton-Regression-Guards)
        working-directory: client
        run: npm test
        # Wenn DIESER Step rot wird, ist mit hoher Wahrscheinlichkeit
        # entweder UpdateButton.tsx oder App.css (.update-modal*-Regeln)
        # so geaendert dass die Svenny-Bug-Regression wieder reinkommen
        # koennte. Vor dem Release fixen, nicht Tests anpassen.

  # ---- Per-platform build job ----
  # Each runner builds the installer for its OS, signs it with our
  # Ed25519 updater key, and uploads the artifacts (.exe / .dmg /
  # .app.tar.gz, plus the matching .sig) to the GitHub release that
  # `tauri-action` creates / updates for this tag.
  build:
    needs: release-preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis
            runner-label: 'Windows x64 (NSIS)'
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            runner-label: 'macOS Apple Silicon (DMG)'

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.runner-label }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Load bilingual release notes
        id: relnotes
        shell: bash
        run: |
          set -euo pipefail
          # release-preflight has already verified this file exists +
          # is bilingual (🇩🇪 + 🇬🇧). tauri-action writes `releaseBody`
          # into BOTH the GitHub release body AND latest.json `notes` —
          # so the in-app updater modal renders these notes. Heredoc to
          # $GITHUB_OUTPUT preserves the multi-line Markdown verbatim.
          NOTES="docs/release-notes/${GITHUB_REF_NAME}.md"
          {
            echo "body<<AEROACARS_NOTES_EOF"
            cat "$NOTES"
            echo "AEROACARS_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + sign (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # v0.9.0 (#GlitchTip): DSNs zur Build-Zeit eingebrannt.
          # Rust liest sie per option_env!() in src-tauri/src/sentry_init.rs,
          # React liest sie per import.meta.env.VITE_SENTRY_DSN_CLIENT in
          # client/src/lib/sentry.ts. Wenn Secrets nicht gesetzt sind,
          # initialisiert Sentry sich nicht (No-Op, kein Crash) — der
          # Build laeuft trotzdem durch.
          AEROACARS_SENTRY_DSN: ${{ secrets.AEROACARS_SENTRY_DSN }}
          VITE_SENTRY_DSN_CLIENT: ${{ secrets.VITE_SENTRY_DSN_CLIENT }}
        with:
          projectPath: client
          tagName: ${{ github.ref_name }}
          releaseName: 'AeroACARS ${{ github.ref_name }}'
          # The full bilingual (🇩🇪 + 🇬🇧) release notes from
          # docs/release-notes/v{tag}.md — loaded in the step above.
          # tauri-action puts this into the GitHub release body AND the
          # latest.json `notes` field the in-app update modal renders.
          releaseBody: ${{ steps.relnotes.outputs.body }}
          releaseDraft: true
          # BETA-KANAL (v0.21): Tags mit "-beta"/"-rc" werden als PRE-RELEASE
          # markiert. Das ist keine Kosmetik, sondern die Schranke:
          #
          # Der Auto-Updater der Piloten fragt
          #   /releases/latest/download/latest.json
          # ab. GitHub fuehrt ein Pre-Release NICHT als "latest" — die
          # Beta ist dort also unsichtbar. Wer sie testen will, laedt sie
          # bewusst von der Releases-Seite.
          #
          # Ohne diese Zeile waere `prerelease: false` hart verdrahtet und
          # ein Beta-Tag ginge an JEDEN Piloten raus. Genau das soll die
          # Beta verhindern.
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ---- X-Plane Premium Plugin: per-platform build ----
  # Builds the optional native X-Plane plugin on each platform. Produces
  # one `.xpl` per OS:
  #   Windows  → win.xpl  (MSVC, x86_64)
  #   macOS    → mac.xpl  (Clang, universal x86_64+arm64)
  #   Linux    → lin.xpl  (GCC, x86_64)
  # The artifacts are uploaded individually so the `plugin-package`
  # job can stitch them into the X-Plane fat-folder layout and ship
  # one combined `.zip` to pilots.
  plugin-build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows-2022 gepinnt (2026-06-12): GitHubs windows-latest-Rollout
          # auf das 2025er-Image liefert VMs ohne Visual-Studio-Instanz —
          # "could not find any instance of Visual Studio" beim CMake-Configure
          # (v0.16.12-Run 27403478349, 2x reproduziert). Zurueck auf latest,
          # sobald das Image stabil VS traegt.
          - platform: windows-2022
            generator: 'Visual Studio 17 2022'
            cmake_args: '-A x64'
            xpl_name: 'win.xpl'
            os_label: 'Windows x64'
          - platform: macos-latest
            generator: 'Unix Makefiles'
            # Semicolon in CMake list arg must be inside double-quotes
            # so bash doesn't split it as a command separator.
            cmake_args: '-DCMAKE_BUILD_TYPE=Release "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"'
            xpl_name: 'mac.xpl'
            os_label: 'macOS universal'
          - platform: ubuntu-latest
            generator: 'Unix Makefiles'
            cmake_args: '-DCMAKE_BUILD_TYPE=Release'
            xpl_name: 'lin.xpl'
            os_label: 'Linux x64'

    runs-on: ${{ matrix.platform }}
    name: Plugin — ${{ matrix.os_label }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure CMake
        working-directory: xplane-plugin
        shell: bash
        run: |
          cmake -B build -G "${{ matrix.generator }}" ${{ matrix.cmake_args }}

      - name: Build plugin (Release)
        working-directory: xplane-plugin
        shell: bash
        run: |
          cmake --build build --config Release --target AeroACARS

      - name: List build output (debug)
        working-directory: xplane-plugin
        shell: bash
        run: |
          ls -la build/AeroACARS/64/

      - name: Upload .xpl artifact
        uses: actions/upload-artifact@v4
        with:
          name: xplane-plugin-${{ matrix.xpl_name }}
          path: xplane-plugin/build/AeroACARS/64/${{ matrix.xpl_name }}
          if-no-files-found: error
          retention-days: 7

  # ---- X-Plane Premium Plugin: package + upload to release ----
  # Downloads all three .xpl artifacts, assembles the X-Plane fat-
  # plugin folder layout, and uploads `AeroACARS-XPlane-Plugin-vX.zip`
  # to the GitHub draft release. Pilots can drop that zip straight
  # into <X-Plane>/Resources/plugins/.
  plugin-package:
    needs: [plugin-build, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download Windows .xpl
        uses: actions/download-artifact@v4
        with:
          name: xplane-plugin-win.xpl
          path: pkg/AeroACARS/64

      - name: Download macOS .xpl
        uses: actions/download-artifact@v4
        with:
          name: xplane-plugin-mac.xpl
          path: pkg/AeroACARS/64

      - name: Download Linux .xpl
        uses: actions/download-artifact@v4
        with:
          name: xplane-plugin-lin.xpl
          path: pkg/AeroACARS/64

      - name: Stage attribution + readme
        run: |
          cp xplane-plugin/README.md pkg/AeroACARS/README.md
          cp xplane-plugin/third_party/XPSDK430/license.txt pkg/AeroACARS/XPLM_SDK_LICENSE.txt

      - name: Show staged folder
        run: |
          find pkg -type f -printf '%p (%s bytes)\n'

      - name: Zip plugin folder
        working-directory: pkg
        run: |
          zip -r ../AeroACARS-XPlane-Plugin-${{ github.ref_name }}.zip AeroACARS

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "AeroACARS-XPlane-Plugin-${{ github.ref_name }}.zip" \
            --clobber

  # ---- Finalise the release (manual gate ab v0.9.0) ----
  #
  # **QS-Hotfix F1 (v0.9.0):** vorher hat dieser Job den Draft sofort nach
  # Build-Ende auto-published. Beim v0.9.0-Tag-Push ging dadurch ein
  # ungestestetes Release ~15 min an `releases/latest`, bevor manuelles QS
  # ueberhaupt anfing. Auto-Updater-Polling ist zwar harmlos vorbeigelaufen
  # (0 Pilots-Downloads in dem Fenster), aber das Risiko ist real.
  #
  # Neues Verhalten: der Promote-Step lebt jetzt unter `workflow_dispatch`,
  # NICHT mehr im tag-push-Trigger. Tag-Push baut nur noch den Draft,
  # der dann von Thomas manuell via UI ("Publish Release"-Button) ODER via
  # `gh workflow run promote-release.yml -f tag=v0.9.0` freigegeben wird.
  #
  # Falls in v0.10+ wieder auto-publish gewuenscht ist: dieser Block bekommt
  # `if: ${{ github.event_name == 'workflow_dispatch' }}` und einen separaten
  # `workflow_dispatch:`-Trigger oben. Aber Standard ist und bleibt
  # human-in-the-loop.
  #
  # Job-Definition bewusst stehen gelassen aber inaktiv (= laeuft nie weil
  # `if: false`). Loescht nicht damit der Diff zur v0.8.5-release.yml klar
  # bleibt und ein zukuenftiger Auto-Publish-Switch nur das `if:` wechseln muss.
  publish:
    if: false  # Manual-Gate aktiv — siehe QS-Hotfix F1 Kommentar oben
    needs: [build, plugin-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Promote draft → public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --latest
